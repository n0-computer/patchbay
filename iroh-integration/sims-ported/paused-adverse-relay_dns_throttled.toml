[sim]
name = "paused-adverse-relay_dns_throttled"
binaries = "iroh-defaults.toml"

[[router]]
name = "dc"

[device.relay.eth0]
gateway = "dc"

[device.provider.eth0]
gateway = "dc"

[device.fetcher.eth0]
gateway = "dc"

[[step]]
action      = "spawn"
id          = "relay"
device      = "relay"
cmd         = ["${binary.relay}", "--dev"]
ready_after = "2s"

[[step]]
action    = "set-impair"
device    = "fetcher"
interface = "eth0"
impair    = { rate = 4000, loss = 0.0, latency = 200 }

[[step]]
action   = "spawn"
kind     = "iroh-transfer"
id       = "xfer"
provider = "provider"
fetcher  = "fetcher"
strategy = "endpoint_id_with_direct_addrs"
duration = "30s"
relay_url = "http://$NETSIM_IP_relay:3340"

[[step]]
action = "wait-for"
id     = "xfer"

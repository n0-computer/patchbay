[sim]
name = "ported-paused-interface_switch-route_switch_both_multi_nat"
binaries = "iroh-defaults.toml"
chuck_compat = true

[[router]]
name = "dc"

[[router]]
name = "lan-provider-a"
nat = "destination-independent"

[[router]]
name = "lan-provider-b"
nat = "destination-independent"

[[router]]
name = "lan-fetcher-a"
nat = "destination-independent"

[[router]]
name = "lan-fetcher-b"
nat = "destination-independent"

[device.relay.eth0]
gateway = "dc"

[device.provider]
default_via = "eth0"

[device.provider.eth0]
gateway = "lan-provider-a"

[device.provider.eth1]
gateway = "lan-provider-b"

[device.fetcher]
default_via = "eth0"

[device.fetcher.eth0]
gateway = "lan-fetcher-a"

[device.fetcher.eth1]
gateway = "lan-fetcher-b"

[[step]]
action      = "spawn"
id          = "relay"
device      = "relay"
cmd         = ["${binary.relay}", "--dev"]
ready_after = "2s"

[[step]]
action    = "set-impair"
device    = "fetcher"
interface = "eth0"
impair    = { rate = 10000, loss = 0.0, latency = 50 }

[[step]]
action    = "set-impair"
device    = "fetcher"
interface = "eth1"
impair    = { rate = 10000, loss = 0.0, latency = 50 }

[[step]]
action   = "spawn"
kind     = "iroh-transfer"
id       = "xfer"
provider = "provider"
fetcher  = "fetcher"
strategy = "endpoint_id_with_direct_addrs"
duration = "15s"
relay_url = "http://$NETSIM_IP_relay:3340"

[[step]]
action   = "wait"
duration = "5s"

[[step]]
action = "switch-route"
device = "fetcher"
to     = "eth1"

[[step]]
action = "switch-route"
device = "provider"
to     = "eth1"

[[step]]
action = "wait-for"
id     = "xfer"

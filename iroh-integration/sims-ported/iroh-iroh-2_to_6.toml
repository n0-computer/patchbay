[sim]
name = "iroh-iroh-2_to_6"
binaries = "iroh-defaults.toml"

[[router]]
name = "dc"

[device.provider]
count = 2

[device.provider.eth0]
gateway = "dc"

[device.fetcher]
count = 6

[device.fetcher.eth0]
gateway = "dc"

[[step]]
action   = "spawn"
kind     = "iroh-transfer"
id       = "xfer-0"
provider = "provider-0"
fetchers = ["fetcher-0", "fetcher-2", "fetcher-4"]
strategy = "endpoint_id_with_direct_addrs"
duration = "20s"
fetch_args = ["--size=1G"]

[[step]]
action   = "spawn"
kind     = "iroh-transfer"
id       = "xfer-1"
provider = "provider-1"
fetchers = ["fetcher-1", "fetcher-3", "fetcher-5"]
strategy = "endpoint_id_with_direct_addrs"
duration = "20s"
fetch_args = ["--size=1G"]

[[step]]
action = "wait-for"
id     = "xfer-0"

[[step]]
action = "wait-for"
id     = "xfer-1"

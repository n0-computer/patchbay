[sim]
name = "ported-iroh-iroh_relay_only-2_to_4"
binaries = "iroh-defaults.toml"
chuck_compat = true

[[router]]
name = "dc"

[device.relay.eth0]
gateway = "dc"

[device.provider]
count = 2

[device.provider.eth0]
gateway = "dc"

[device.fetcher]
count = 4

[device.fetcher.eth0]
gateway = "dc"

[[step]]
action      = "spawn"
id          = "relay"
device      = "relay"
cmd         = ["${binary.relay}", "--dev"]
ready_after = "2s"

[[step]]
action   = "spawn"
kind     = "iroh-transfer"
id       = "xfer-0"
provider = "provider-0"
fetchers = ["fetcher-0", "fetcher-2"]
strategy = "endpoint_id_with_direct_addrs"
duration = "20s"
relay_url = "http://$NETSIM_IP_relay:3340"
fetch_args = ["--size=1G", "--relay-only"]

[[step]]
action   = "spawn"
kind     = "iroh-transfer"
id       = "xfer-1"
provider = "provider-1"
fetchers = ["fetcher-1", "fetcher-3"]
strategy = "endpoint_id_with_direct_addrs"
duration = "20s"
relay_url = "http://$NETSIM_IP_relay:3340"
fetch_args = ["--size=1G", "--relay-only"]

[[step]]
action = "wait-for"
id     = "xfer-0"

[[step]]
action = "wait-for"
id     = "xfer-1"
